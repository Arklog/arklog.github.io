name: Build & Update Deployment Branch

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy-branch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Push to deployment branch
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git fetch origin
          git checkout -B deployment
          rm -rf src/ node_modules
          git add .
          git commit -m "Update deployment branch from main" || echo "No changes to commit"
          git push origin deployment --force